name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      # fetch-depth: 0 -- version is derived from git tags (hatch-vcs), which
      # a shallow checkout wouldn't have.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v

  smoke:
    name: CLI smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install .

      - name: Verify the CLI entry point works
        run: |
          runtipi-companion --help
          runtipi-companion config --help
          runtipi-companion backup --help

      - name: Verify config init + validate round-trip
        run: |
          runtipi-companion config init --path /tmp/config.yaml
          runtipi-companion config validate --config /tmp/config.yaml

  ansible-lint:
    name: Lint ansible playbook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run ansible-lint and syntax check
        run: |
          pip install ansible-lint ansible-core
          ansible-lint deploy/ansible/install.yml
          ansible-playbook --syntax-check -i deploy/ansible/inventory.example.yml deploy/ansible/install.yml

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [test, smoke]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build

      - name: Check metadata
        run: |
          pip install twine
          twine check dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  # Publish every main-branch build to TestPyPI so a broken sdist/wheel or
  # metadata issue surfaces before a real release tag, not after. Skipped on
  # PRs (forks can't hold the trusted-publisher OIDC identity anyway).
  # Requires a TestPyPI trusted publisher for this repo/workflow
  # (https://docs.pypi.org/trusted-publishers/) and a GitHub environment
  # named "testpypi". No API token secrets needed.
  publish-testpypi:
    name: Publish to TestPyPI
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: testpypi
      url: https://test.pypi.org/p/runtipi-companion
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  # Post-build test: install the *built wheel* plus real rclone and
  # tailscale, then run the full backup -> sync -> prune -> restore cycle
  # (tests/e2e/e2e.sh). Uses a seeded runtipi directory layout with a stub
  # runtipi-cli: apps can only be installed through the runtipi web UI, and
  # the backup/restore flow never invokes the CLI when apps aren't running.
  e2e:
    name: E2E (built wheel + rclone + tailscale)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Install the built wheel
        run: pip install dist/*.whl

      - name: Install rclone
        run: sudo apt-get update && sudo apt-get install -y rclone

      - name: Install tailscale
        run: curl -fsSL https://tailscale.com/install.sh | sh

      - name: Run end-to-end suite
        run: bash tests/e2e/e2e.sh

  # Same suite, but against a real Runtipi install from the official
  # installer (docker compose stack + real runtipi-cli). Non-blocking:
  # upstream installer or image changes shouldn't fail our CI.
  e2e-real-runtipi:
    name: E2E against a real Runtipi install
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Install the built wheel into a venv
        run: |
          python -m venv "$HOME/rtc-venv"
          "$HOME/rtc-venv/bin/pip" install dist/*.whl

      - name: Install rclone
        run: sudo apt-get update && sudo apt-get install -y rclone

      - name: Install tailscale
        run: curl -fsSL https://tailscale.com/install.sh | sh

      - name: Install Runtipi (official installer)
        run: |
          mkdir -p "$HOME/runtipi-e2e"
          cd "$HOME/runtipi-e2e"
          curl -L https://setup.runtipi.io | bash

      - name: Locate runtipi-cli
        run: |
          CLI=$(sudo find "$HOME/runtipi-e2e" /opt -maxdepth 3 -name runtipi-cli -type f 2>/dev/null | head -1)
          if [ -z "$CLI" ]; then
            echo "runtipi-cli not found after install" >&2
            exit 1
          fi
          echo "RUNTIPI_DIR=$(dirname "$CLI")" >> "$GITHUB_ENV"

      # Root, because the installer creates the runtipi tree root-owned.
      - name: Run end-to-end suite against the real install
        run: sudo env "PATH=$HOME/rtc-venv/bin:$PATH" RUNTIPI_DIR="$RUNTIPI_DIR" bash tests/e2e/e2e.sh

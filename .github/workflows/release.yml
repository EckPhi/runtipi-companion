name: Release

# Deploy pipeline: push a tag like v0.1.0 to test, build, publish to PyPI,
# and create a GitHub release with the artifacts attached.
on:
  push:
    tags: ["v*"]

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 -- version is derived from git tags (hatch-vcs), which
      # a shallow checkout wouldn't have.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build

      - name: Verify tag matches package version
        run: |
          pip install .
          PKG_VERSION=$(python -c "from importlib.metadata import version; print(version('runtipi-companion'))")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $PKG_VERSION" >&2
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    # Requires a PyPI "trusted publisher" configured for this repo/workflow
    # (https://docs.pypi.org/trusted-publishers/) and a GitHub environment
    # named "pypi". No API token secrets needed.
    environment:
      name: pypi
      url: https://pypi.org/p/runtipi-companion
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create release with artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
